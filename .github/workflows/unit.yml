name: unit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  colcon-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v3

      # Build + test inside the orynth base image so unit CI runs in the exact
      # environment Phase 1+ uses. Avoids rosdep/skip-keys drift against a plain
      # ros base, and exercises base.Dockerfile on every PR.
      - name: Build base image
        run: docker buildx build --load -f docker/base.Dockerfile -t orynth-base:ci .

      - name: colcon build + test
        run: |
          docker run --rm -v "$PWD":/workspace -w /workspace/ros2_ws orynth-base:ci \
            bash -c '
              set -e
              colcon build --packages-skip swarm_hardware
              colcon test --packages-skip swarm_hardware --return-code-on-test-failure
              colcon test-result --verbose
            '
