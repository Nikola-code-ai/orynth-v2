name: unit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  colcon-test:
    runs-on: ubuntu-22.04
    container:
      image: ros:humble-ros-base-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Install rosdep deps
        shell: bash
        run: |
          set -e
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions python3-rosdep python3-pytest python3-pytest-cov
          if [ ! -f /etc/ros/rosdep/sources.list.d/20-default.list ]; then
            rosdep init
          fi
          rosdep update
          cd ros2_ws
          rosdep install --from-paths src --ignore-src -y \
            --skip-keys "behaviortree_cpp octomap_server rtabmap_ros foxglove_bridge"

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon build --packages-skip swarm_hardware

      - name: colcon test
        shell: bash
        run: |
          source /opt/ros/humble/setup.bash
          cd ros2_ws
          colcon test --packages-skip swarm_hardware --return-code-on-test-failure
          colcon test-result --verbose
