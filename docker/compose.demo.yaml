# Phase 2.5b — leader-follow HARDWARE demo, one drone per Jetson Nano.
#
# This is the hardware swarm counterpart of docker/compose.swarm.yaml. Each
# Jetson runs this compose file with its own DRONE_ID; the file brings up one
# namespaced MAVROS against the real ArduPilot flight controller wired to that
# Jetson, plus a `radio_bridge` instance for the SiK/RFD900 inter-drone link.
# The leader's Jetson (DRONE_ID=0) additionally runs WITH_SWARM_SERVER so it
# hosts the Foxglove bridge and the swarm orchestrator.
#
#   # on every Jetson, leader first:
#   DRONE_ID=0 WITH_SWARM_SERVER=1 make demo-up   # leader   (drone_0)
#   DRONE_ID=1 make demo-up                       # follower (drone_1)
#
# Networking model (ADR 0009): each Jetson has its OWN ROS_DOMAIN_ID
# (`100 + DRONE_ID`) and DDS is bound to `lo` via `cyclonedds_local_only.xml`.
# There is no shared DDS LAN any more. Cross-drone topics ride MAVLink over
# the radio that `radio_bridge` owns. `network_mode: host` stays so the
# container can see the RFD900 USB-UART; it is no longer there for DDS.
#
# Overridable env (export, or use an .env file):
#   DRONE_ID            this drone's index 0..N-1           (default 0)
#   DRONE_COUNT         drones in the swarm                 (default 2)
#   WITH_SWARM_SERVER   1 on the leader's Jetson only       (default 0)
#   FC_DEVICE           host serial device to the FC        (default /dev/ttyTHS1)
#   FCU_URL             MAVROS endpoint, serial:///dev:baud (default 921600 baud)
#   RADIO_DEVICE        host serial device to the radio     (default /dev/ttyUSB_RFD)
#   RADIO_BAUD          radio baud rate                     (default 57600)
#   RADIO_ROLE          leader | follower                   (default derived from WITH_SWARM_SERVER)
name: orynth-demo

services:
  companion:
    image: orynth-base:dev
    build:
      context: ..
      dockerfile: docker/base.Dockerfile
    container_name: orynth-demo-${DRONE_ID:-0}
    # Host networking — needed for USB-UART device passthrough and so the
    # operator can reach the Foxglove bridge from the GCS over WiFi.
    # NOT required for inter-drone discovery any more (ADR 0009).
    network_mode: host
    volumes:
      - ../ros2_ws:/workspace/ros2_ws:ro
      - ../scripts:/workspace/scripts:ro
      - ../config:/workspace/config:ro
    # Both serial devices: the flight controller and the inter-drone radio.
    # Host paths overridable; in-container paths are fixed.
    devices:
      - "${FC_DEVICE:-/dev/ttyTHS1}:/dev/ttyTHS1"
      - "${RADIO_DEVICE:-/dev/ttyUSB_RFD}:/dev/ttyUSB_RFD"
    environment:
      # Per-drone DDS domain — no longer shared. Defence in depth on top of
      # cyclonedds_local_only.xml binding to `lo`.
      - ROS_DOMAIN_ID=100
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - CYCLONEDDS_URI=file:///workspace/config/networks/cyclonedds_local_only.xml
      - DRONE_ID=${DRONE_ID:-0}
      - DRONE_COUNT=${DRONE_COUNT:-2}
      - WITH_SWARM_SERVER=${WITH_SWARM_SERVER:-0}
      - FCU_URL=${FCU_URL:-serial:///dev/ttyTHS1:921600}
      - FOXGLOVE_PORT=8765
      - LEADER_POSE_TIMEOUT=${LEADER_POSE_TIMEOUT:-1.5}
      - FORMATION_ALT_STEP=0.0
      # Heading-lock the formation: it translates with the leader but never
      # rotates around it. Hardware-critical — ArduPilot's WP_YAW_BEHAVIOR
      # yaws the leader's nose toward each goto target, which would otherwise
      # swing followers through the leader on every direction change.
      - FORMATION_LOCK_HEADING=${FORMATION_LOCK_HEADING:-1}
      # Radio bridge config — see swarm_radio.radio_bridge_node.
      - RADIO_DEVICE=/dev/ttyUSB_RFD
      - RADIO_BAUD=${RADIO_BAUD:-57600}
      - RADIO_ROLE=${RADIO_ROLE:-}
    command: ["bash", "/workspace/scripts/bringup/demo_companion.sh"]
    healthcheck:
      # Healthy once this drone's MAVROS reports a live link to its FC.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - "source /opt/ros/humble/setup.bash && timeout 7 ros2 topic echo --once /drone_${DRONE_ID:-0}/mavros/state 2>/dev/null | grep -iqE 'connected:[[:space:]]*true'"
      interval: 6s
      timeout: 8s
      retries: 40
      # The companion builds the swarm overlay (~60-90 s) before launching.
      start_period: 120s
